<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LineByLine — My Progress</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <div class="top-bar">
    <div class="logo small">LineByLine</div>
    <button class="progress-link" onclick="window.location.href='index.html'">← Home</button>
  </div>

  <div class="owl-bubble" style="margin-bottom: 2rem;">
    <div class="owl-wrap">
      <svg class="owl" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="38" rx="20" ry="22" fill="#f3eeff" stroke="#d4c8f5" stroke-width="1.5"/>
        <ellipse cx="32" cy="22" rx="17" ry="16" fill="#f3eeff" stroke="#d4c8f5" stroke-width="1.5"/>
        <ellipse cx="23" cy="22" rx="7" ry="8" fill="#fff" stroke="#d4c8f5" stroke-width="1"/>
        <ellipse cx="41" cy="22" rx="7" ry="8" fill="#fff" stroke="#d4c8f5" stroke-width="1"/>
        <circle cx="23" cy="22" r="4.5" fill="#534ab7"/>
        <circle cx="41" cy="22" r="4.5" fill="#534ab7"/>
        <circle cx="24.5" cy="20.5" r="1.5" fill="#fff"/>
        <circle cx="42.5" cy="20.5" r="1.5" fill="#fff"/>
        <polygon points="32,28 29,31 35,31" fill="#f0bcd4" stroke="#d4c8f5" stroke-width="0.5"/>
        <ellipse cx="20" cy="40" rx="5" ry="7" fill="#e8d8fc" stroke="#d4c8f5" stroke-width="1" transform="rotate(-10 20 40)"/>
        <ellipse cx="44" cy="40" rx="5" ry="7" fill="#e8d8fc" stroke="#d4c8f5" stroke-width="1" transform="rotate(10 44 40)"/>
        <rect x="26" y="57" width="5" height="6" rx="2" fill="#b8aae8" stroke="#d4c8f5" stroke-width="1"/>
        <rect x="33" y="57" width="5" height="6" rx="2" fill="#b8aae8" stroke="#d4c8f5" stroke-width="1"/>
        <ellipse cx="28" cy="64" rx="5" ry="2" fill="#c9bbf0" stroke="#d4c8f5" stroke-width="0.8"/>
        <ellipse cx="36" cy="64" rx="5" ry="2" fill="#c9bbf0" stroke="#d4c8f5" stroke-width="0.8"/>
        <ellipse cx="28" cy="64" rx="3" ry="1" fill="#7f77dd" opacity="0.5"/>
        <ellipse cx="36" cy="64" rx="3" ry="1" fill="#7f77dd" opacity="0.5"/>
        <ellipse cx="28" cy="68" rx="4" ry="1.2" fill="#d4c8f5" opacity="0.4"/>
        <ellipse cx="36" cy="68" rx="4" ry="1.2" fill="#d4c8f5" opacity="0.4"/>
        <ellipse cx="28" cy="71" rx="3" ry="0.8" fill="#d4c8f5" opacity="0.25"/>
        <ellipse cx="36" cy="71" rx="3" ry="0.8" fill="#d4c8f5" opacity="0.25"/>
        <circle cx="14" cy="32" r="2" fill="#7f77dd" opacity="0.6"/>
        <circle cx="50" cy="32" r="2" fill="#7f77dd" opacity="0.6"/>
        <circle cx="12" cy="38" r="1.3" fill="#b8aae8" opacity="0.5"/>
        <circle cx="52" cy="38" r="1.3" fill="#b8aae8" opacity="0.5"/>
      </svg>
    </div>
    <div class="bubble">
      <p id="progress-greeting">Loading...</p>
    </div>
  </div>

  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="stat-sessions">0</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-streak">0</div>
      <div class="stat-label">Day streak 🔥</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-texts">0</div>
      <div class="stat-label">Texts done</div>
    </div>
  </div>

  <hr class="divider" />

  <!-- Session history -->
  <div class="section-label">Your sessions</div>
  <div id="history-list"></div>

</div>

<script>
  const name = localStorage.getItem('userName') || 'there';
  const history = JSON.parse(localStorage.getItem('sessionHistory') || '[]');

  function getStreak() {
    if (history.length === 0) return 0;
    const today = new Date().toDateString();
    const dates = [...new Set(history.map(s => new Date(s.date).toDateString()))];
    dates.sort((a, b) => new Date(b) - new Date(a));
    if (dates[0] !== today && dates[0] !== new Date(Date.now() - 86400000).toDateString()) return 0;
    let streak = 1;
    for (let i = 1; i < dates.length; i++) {
      const diff = (new Date(dates[i-1]) - new Date(dates[i])) / 86400000;
      if (diff === 1) streak++;
      else break;
    }
    return streak;
  }

  const streak = getStreak();
  const uniqueTexts = [...new Set(history.map(s => s.text))].length;

  document.getElementById('stat-sessions').textContent = history.length;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-texts').textContent = uniqueTexts;

  if (history.length === 0) {
    document.getElementById('progress-greeting').textContent =
      "Hi " + name + "! You haven't done any sessions yet — head back home and give it a try!";
  } else {
    document.getElementById('progress-greeting').innerHTML =
      "Great work, <strong>" + name + "</strong>! Here's everything you've built so far. Look how far you've come! &#127775;";
  }

  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = '<p class="empty-msg">No sessions yet! Go practice and come back here to see your progress.</p>';
  } else {
    const sorted = [...history].reverse();
    sorted.forEach(function(session) {
      const card = document.createElement('div');
      card.className = 'history-card';
      const date = new Date(session.date).toLocaleDateString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric'
      });
      card.innerHTML =
        '<div class="history-top">' +
          '<div class="history-title">' + session.text + '</div>' +
          '<div class="history-meta">' + date + ' · ' + session.time + '</div>' +
        '</div>' +
        (session.claim
          ? '<div class="history-claim">"' + session.claim + '"</div>'
          : '');
      list.appendChild(card);
    });
  }
</script>

</body>
</html>
