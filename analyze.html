<script>
const tier = localStorage.getItem('tier') || 'middle';
const skills = JSON.parse(localStorage.getItem('skills') || '[]');
const wantsThesis = skills.includes('Writing a thesis');

const texts = [
  {
    id: 'charlottes-web',
    title: "Charlotte's Web",
    author: 'E.B. White',
    passage: "Wilbur didn't want food, he wanted love. He wanted a friend — someone who would play with him. But no one came, no one spoke to him, and he began to cry. The barn was very large. It was very old. It smelled of hay and it smelled of manure. It smelled of the perspiration of tired horses and the wonderful sweet breath of patient cows. Wilbur liked it.",
    tiers: ['elementary'],
    questions: {
      elementary: [
        { text: "How is Wilbur feeling? What words tell you that?", context: null },
        { text: "What does Wilbur want more than food?", context: null },
        { text: "Does Wilbur like the barn? What makes you think that?", context: null },
        { text: "Why do you think Wilbur feels lonely?", context: null },
        { text: "Now that we talked about it — what do you think the author wrote this for? Has your answer changed?", context: null }
      ]
    }
  },
  {
    id: 'charlie-chocolate',
    title: 'Charlie and the Chocolate Factory',
    author: 'Roald Dahl',
    passage: "Nobody ever went in, and nobody ever came out. Yet every day, the workers in the factory heard, coming from somewhere deep inside, the most wonderful music — a grand, booming, rushing, whispering sound, as though the great hidden chocolate river was flowing endlessly on and on. And the smell! Great swooping whiffs of chocolate came drifting out through the dark, mysterious air.",
    tiers: ['elementary'],
    questions: {
      elementary: [
        { text: "What is strange about the chocolate factory?", context: null },
        { text: "What do the workers hear coming from inside?", context: null },
        { text: "How does the factory make you feel? Why?", context: null },
        { text: "Pick one word from the passage that you really like. Why did you pick it?", context: null },
        { text: "Now that we talked about it — what do you think the author wrote this for? Has your answer changed?", context: null }
      ]
    }
  },
  {
    id: 'matilda',
    title: 'Matilda',
    author: 'Roald Dahl',
    passage: "Matilda was a little late in starting to read, but once she did, she read everything she could lay her hands on. By the age of three, Matilda had worked her way through all the books in the children's section and had begun wandering the shelves of the grown-up library. The books transported her into new worlds and introduced her to amazing people who lived exciting lives.",
    tiers: ['elementary'],
    questions: {
      elementary: [
        { text: "What does Matilda love to do?", context: null },
        { text: "How is Matilda different from other kids her age?", context: null },
        { text: "Have you ever felt like a book took you somewhere else? What was that like?", context: null },
        { text: "Why do you think the author wants us to know Matilda read so many books?", context: null },
        { text: "Now that we talked about it — what do you think the author wrote this for? Has your answer changed?", context: null }
      ]
    }
  },
  {
    id: 'ivan',
    title: 'The One and Only Ivan',
    author: 'Katherine Applegate',
    passage: "I am Ivan. I am a gorilla. It's not as easy as it looks. People call me the Freeway Gorilla. The Ape at Exit 8. The One and Only Ivan, Mighty Silverback. The names people give me are their way of making me small. I am not small.",
    tiers: ['elementary'],
    questions: {
      elementary: [
        { text: "Who is telling this story? What do we know about him?", context: null },
        { text: "How does Ivan feel about the names people call him?", context: null },
        { text: "Why do you think Ivan says 'I am not small' at the end?", context: null },
        { text: "Pick one sentence from the passage that stands out to you. Why did you pick it?", context: null },
        { text: "Now that we talked about it — what do you think the author wrote this for? Has your answer changed?", context: null }
      ]
    }
  },
  {
    id: 'secret-garden',
    title: 'The Secret Garden',
    author: 'Frances Hodgson Burnett',
    passage: "She never remembered seeing familiarly anything but the dark faces of her Ayah and the other native servants, and as they always obeyed her and gave her her own way in everything, because the Mem Sahib would be angry if she was disturbed by her crying, by the time she was six years old she was as tyrannical and selfish a little pig as ever lived. The young English governess who came to teach her to read and write disliked her so much that she gave up her place in three months, and when other governesses came to try to fill it they always went away in a shorter time than the first one.\n\nOne frightfully hot morning, when she was about nine years old, she awakened feeling very cross, and she became crosser still when she saw that the servant who stood by her bedside was not her Ayah. There was something mysterious in the air that morning. Nothing was done in its regular order and several of the native servants seemed missing, while those whom Mary saw slunk or hurried about with ashy and scared faces. But no one would tell her anything and her Ayah did not come.",
    tiers: ['middle', 'upper', 'advanced'],
    questions: {
      middle: [
        { text: "What kind of person is Mary at the start of this passage? What clues tell you that?", context: null },
        { text: "Pick one word or sentence that stands out to you. Why did you notice it?", context: null },
        { text: "How does Mary treat the people around her? Why do you think she acts this way?", context: null },
        { text: "Something strange is happening around Mary but nobody tells her what. How does that make the mood of the passage feel?", context: null },
        { text: "Write one sentence that describes what this passage is really about.", context: null }
      ],
      upper: [
        { text: "How does Burnett use Mary's behavior to reveal something about the environment she grew up in?", context: null },
        { text: "What is the effect of the servants being described as having 'ashy and scared faces' while Mary is focused only on herself?", context: null },
        { text: "What does Mary's reaction to not having her Ayah tell us about how she understands the world around her?", context: null },
        { text: "How does Burnett build a sense of unease in this passage without directly telling us what is wrong?", context: null },
        { text: "Now that we've worked through it together — try writing your claim one more time. How has your thinking changed?", context: null }
      ],
      advanced: [
        { text: "This passage is set in colonial India. How does Burnett use Mary's upbringing to critique or reflect the values of British colonialism without explicitly naming them?", context: { title: "British Colonialism", text: "British colonialism was a period lasting from the 1600s to the mid-1900s during which Britain controlled large parts of the world, including India. It came with strong beliefs about racial and cultural superiority that shaped social structures, daily life, and the relationships between different groups of people." } },
        { text: "The servants are described only through Mary's perspective. What is the effect of that narrative choice, and what does it reveal about whose story is centered?", context: null },
        { text: "How does Burnett use Mary's obliviousness as a literary device to create dramatic irony for the reader?", context: null },
        { text: "What argument could you make about how power, privilege, and isolation shape a child's moral development based on this passage alone?", context: null },
        { text: "Now that we've worked through it together — try writing your claim one more time. How has your thinking changed?", context: { title: "British Colonialism", text: "British colonialism was a period lasting from the 1600s to the mid-1900s during which Britain controlled large parts of the world, including India. It came with strong beliefs about racial and cultural superiority that shaped social structures, daily life, and the relationships between different groups of people." } }
      ]
    }
  },
  {
    id: 'alice',
    title: "Alice's Adventures in Wonderland",
    author: 'Lewis Carroll',
    passage: "Alice was beginning to get very tired of sitting by her sister on the bank and of having nothing to do; once or twice she had peeped into the book her sister was reading, but it had no pictures or conversations in it, \"and what is the use of a book,\" thought Alice, \"without pictures or conversation?\" So she was considering whether the pleasure of making a daisy-chain would be worth the trouble of getting up and picking the daisies, when suddenly a White Rabbit with pink eyes ran close by her.\n\nIn another moment down went Alice after it, never once considering how in the world she was to get out again. The rabbit-hole went straight on like a tunnel for some way, and then dipped suddenly down, so suddenly that Alice had not a moment to think about stopping herself before she found herself falling down a very deep well.\n\nDown, down, down. Would the fall never come to an end! Suddenly, thump! down she came upon a heap of sticks and dry leaves and the fall was over. Alice was not a bit hurt and she jumped up on to her feet in a moment.",
    tiers: ['middle', 'upper', 'advanced'],
    questions: {
      middle: [
        { text: "Why do you think Alice follows the rabbit without thinking? What does that tell us about her?", context: null },
        { text: "What words does Carroll use to describe the fall? How do they make you feel as a reader?", context: null },
        { text: "How does Alice feel at the end of the passage? Does her reaction surprise you?", context: null },
        { text: "What kind of story do you think this is going to be based on just this opening? What clues tell you that?", context: null },
        { text: "Write one sentence about what you think Carroll wants us to feel reading this.", context: null }
      ],
      upper: [
        { text: "Alice dismisses her sister's book because it has no pictures or conversations. What does this tell us about Alice as a character and what Carroll might be saying about curiosity?", context: null },
        { text: "How does Carroll use pacing — the way the fall slows down with 'Down, down, down' — to create a specific effect on the reader?", context: null },
        { text: "Alice never considers 'how in the world she was to get out again.' What does this detail reveal about childhood versus adult thinking?", context: null },
        { text: "How does Carroll establish Wonderland as a place that operates by different rules than the real world just within this one passage?", context: null },
        { text: "Now that we've worked through it together — try writing your claim one more time. How has your thinking changed?", context: null }
      ],

let currentQ = 0;
let answers = [];
let coldThesis = '';
let seconds = 0;
let timerInterval = null;
let activeQuestions = [];
let selectedText = null;

function pickText() {
  let seen = JSON.parse(localStorage.getItem('seenTexts') || '[]');
  const available = texts.filter(t => t.tiers.includes(tier));
  const unseen = available.filter(t => !seen.includes(t.id));
  if (unseen.length === 0) {
    localStorage.setItem('seenTexts', '[]');
    return available[0];
  }
  return unseen[Math.floor(Math.random() * unseen.length)];
}

window.addEventListener('DOMContentLoaded', function() {
  selectedText = pickText();
  document.getElementById('text-preview').textContent = selectedText.passage;
  document.getElementById('text-preview-2').textContent = selectedText.passage;
  document.getElementById('text-source').textContent = '— ' + selectedText.title + ' by ' + selectedText.author;

  if (tier === 'elementary') {
    document.getElementById('cold-thesis-question').textContent =
      "Before we start — just from reading the passage, what do you think the author wrote this for? Just your best guess in one sentence, no wrong answers!";
  } else {
    document.getElementById('cold-thesis-question').textContent =
      "Before we dive in, read the passage and try writing a claim in one sentence — what do you think the author is trying to say? Don't worry about being perfect, just give it a shot!";
  }
});

function goToStep2() {
  if (wantsThesis) {
    document.getElementById('step-1').classList.add('hidden');
    document.getElementById('step-2').classList.remove('hidden');
  } else {
    startQuestions();
  }
}

function saveColdThesis() {
  const answer = document.getElementById('cold-thesis-answer').value.trim();
  if (answer === '') {
    alert("Give it your best shot — even just one sentence!");
    return;
  }
  coldThesis = answer;
  startQuestions();
}

function startQuestions() {
  activeQuestions = selectedText.questions[tier];
  document.getElementById('text-display').textContent = selectedText.passage;
  document.getElementById('step-1').classList.add('hidden');
  document.getElementById('step-2').classList.add('hidden');
  document.getElementById('step-3').classList.remove('hidden');
  showQuestion(0);
  startTimer();

  const seen = JSON.parse(localStorage.getItem('seenTexts') || '[]');
  if (!seen.includes(selectedText.id)) {
    seen.push(selectedText.id);
    localStorage.setItem('seenTexts', JSON.stringify(seen));
  }
  localStorage.setItem('currentText', selectedText.title);
}

function showQuestion(index) {
  const q = activeQuestions[index];
  document.getElementById('pip-question').textContent = q.text;
  const contextBtn = document.getElementById('context-btn');
  const contextCard = document.getElementById('context-card');
  if (q.context) {
    contextBtn.classList.remove('hidden');
    document.getElementById('context-title').textContent = q.context.title;
    document.getElementById('context-text').textContent = q.context.text;
  } else {
    contextBtn.classList.add('hidden');
  }
  contextCard.classList.add('hidden');
}

function toggleContext() {
  document.getElementById('context-card').classList.toggle('hidden');
}

function nextQuestion() {
  const answerBox = document.getElementById('user-answer');
  const answer = answerBox.value.trim();
  if (answer === '') {
    alert("Don't leave Pip hanging! Write something, even just a few words.");
    return;
  }
  answers.push({ question: activeQuestions[currentQ].text, answer });
  const thread = document.getElementById('qa-thread');
  const entry = document.createElement('div');
  entry.className = 'thread-entry';
  entry.innerHTML =
    '<div class="thread-q">Pip asked: <em>' + activeQuestions[currentQ].text + '</em></div>' +
    '<div class="thread-a">You wrote: ' + answer + '</div>';
  thread.appendChild(entry);
  answerBox.value = '';
  currentQ++;
  if (currentQ < activeQuestions.length) {
    showQuestion(currentQ);
    document.getElementById('pip-question-bubble').scrollIntoView({ behavior: 'smooth' });
  } else {
    finishPractice();
  }
}

function startTimer() {
  timerInterval = setInterval(function() {
    seconds++;
    const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
    const secs = String(seconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = mins + ':' + secs;
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function getFormattedTime() {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  if (mins === 0) return secs + ' seconds';
  if (secs === 0) return mins + ' minutes';
  return mins + ' min ' + secs + ' sec';
}

function finishPractice() {
  stopTimer();

  const finalAnswer = answers[answers.length - 1] ? answers[answers.length - 1].answer : '';
  const timeSpent = getFormattedTime();

  // Save to localStorage
  const sessionHistory = JSON.parse(localStorage.getItem('sessionHistory') || '[]');
  sessionHistory.push({
    date: new Date().toISOString(),
    text: selectedText.title,
    time: timeSpent,
    claim: finalAnswer,
    coldThesis: coldThesis,
    tier: tier
  });
  localStorage.setItem('sessionHistory', JSON.stringify(sessionHistory));

  // Send to Google Sheets silently
  const skills = localStorage.getItem('skills') || '[]';
  const allResponses = answers.map(function(a, i) {
  return 'Q' + (i+1) + ': ' + a.answer;
}).join(' | ');

fetch('https://script.google.com/macros/s/AKfycbw7jYFGdyhdqYvQMI_X_3BDuukx7tsRNTuqEh70rtZZMZOMv0qVm5yGYjbaRrTG5aAb/exec', {
  method: 'POST',
  mode: 'no-cors',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    date: new Date().toLocaleDateString(),
    tier: tier,
    text: selectedText.title,
    time: timeSpent,
    coldThesis: coldThesis || 'N/A',
    finalClaim: finalAnswer,
    skills: JSON.parse(localStorage.getItem('skills') || '[]').join(', '),
    responses: allResponses
  })
}).catch(function(err) {
  console.log('Sheet sync failed silently:', err);
});
  document.getElementById('step-3').classList.add('hidden');
  document.getElementById('step-4').classList.remove('hidden');

  let doneMsg = '';
  if (coldThesis && finalAnswer) {
    doneMsg = 'You started with: "' + coldThesis + '"\n\nAfter working through it, you wrote: "' + finalAnswer + '"\n\nLook how far your thinking came!';
  } else {
    doneMsg = finalAnswer ? 'Here\'s the claim you built: "' + finalAnswer + '"' : "You worked through the whole analysis — that takes real skill!";
  }

  document.getElementById('done-msg').textContent = doneMsg;
  document.getElementById('final-time').textContent = timeSpent;
}
</script>
